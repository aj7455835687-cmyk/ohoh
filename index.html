        <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohoh Super App</title>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }
        /* ohoh अब फेसबुक नीला है और नीचे का नाम हट गया है */
        .logo-text {
            color: #1877F2; 
            font-size: 50px;
            font-weight: bold;
            margin: 0;
            text-shadow: none; 
        }
        .card {
            background-color: white;
            border-radius: 20px;
            margin-bottom: 20px;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }
        /* गूगल के लिए iframe (यह काम करता है) */
        .google-card { border: 4px solid #4285F4; }
        
        /* यूट्यूब, फेसबुक, इंस्टाग्राम के लिए बड़े प्रीव्यू बॉक्स */
        .youtube-card { border: 4px solid #FF0000; color: #FF0000; }
        .facebook-card { border: 4px solid #1877F2; color: #1877F2; }
        .instagram-card { border: 4px solid #E1306C; color: #E1306C; }

        .preview-box {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            background: #f0f0f0;
            border-radius: 10px;
            margin: 10px 0;
        }
        .btn-open {
            display: inline-block;
            padding: 15px 30px;
            background-color: currentColor;
            color: white;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            font-size: 18px;
        }
        iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1 class="logo-text">ohoh</h1>
    </div>

    <div class="card google-card">
        <h3 style="color: #4285F4;">🌐 Google Search</h3>
        <iframe src="https://www.google.com/search?igu=1"></iframe>
    </div>

    <a href="https://m.youtube.com" target="_blank" class="card youtube-card">
        <h3>▶️ YouTube Videos</h3>
        <div class="preview-box">📺</div>
        <div class="btn-open" style="background-color: #FF0000;">यूट्यूब खोलें</div>
    </a>

    <a href="https://m.facebook.com" target="_blank" class="card facebook-card">
        <h3>📘 Facebook Social</h3>
        <div class="preview-box">👤</div>
        <div class="btn-open" style="background-color: #1877F2;">फेसबुक खोलें</div>
    </a>

    <a href="https://www.instagram.com" target="_blank" class="card instagram-card">
        <h3>📸 Instagram Explore</h3>
        <div class="preview-box">🖼️</div>
        <div class="btn-open" style="background-color: #E1306C;">इंस्टाग्राम खोलें</div>
    </a>

    <footer style="text-align: center; color: #888; padding: 20px;">
        Developed by Ajay Kumar
    </footer>
</div>

</body>
            </html>
