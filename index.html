   <html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अजयकुमार डिजिटल सर्विस</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(to right, #1a2a6c, #f21212); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; color: white; }
        .app-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); width: 100%; max-width: 450px; color: #333; }
        h2 { color: #1a2a6c; text-align: center; margin-bottom: 5px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #1a2a6c; outline: none; }
        button { width: 100%; padding: 15px; background: #1a2a6c; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #f21212; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <h2>Ajaykumar Smart Portal</h2>
    <p style="text-align:center; color: #666; margin-bottom: 20px;">अपना विवरण भरें और सेव करें</p>
    
    <form id="fullProfileForm">
        <div class="input-group">
            <label>पूरा नाम</label>
            <input type="text" name="name" id="name" placeholder="आपका नाम लिखें" required>
        </div>

        <div class="input-group">
            <label>ईमेल एड्रेस</label>
            <input type="email" name="email" id="email" placeholder="example@gmail.com" required>
        </div>

        <div class="input-group">
            <label>मोबाइल नंबर</label>
            <input type="tel" name="phone" id="phone" placeholder="74558xxxxx" required>
        </div>

        <div class="input-group">
            <label>शहर / राज्य</label>
            <input type="text" name="city" id="city" placeholder="जैसे: बरेली, उत्तर प्रदेश" required>
        </div>

        <div class="input-group">
            <label>आपकी उम्र</label>
            <input type="number" name="age" id="age" placeholder="जैसे: 22" required>
        </div>

        <div class="input-group">
            <label>पढ़ाई / डिग्री</label>
            <select name="edu" id="edu">
                <option value="10th">10वीं पास</option>
                <option value="12th">12वीं पास</option>
                <option value="Graduate">ग्रेजुएट</option>
                <option value="Post Graduate">पोस्ट ग्रेजुएट</option>
            </select>
        </div>

        <div class="input-group">
            <label>आपकी खास स्किल (हुनर)</label>
            <textarea name="skills" id="skills" rows="2" placeholder="जैसे: कंप्यूटर, टाइपिंग आदि"></textarea>
        </div>

        <button type="submit" id="submitBtn">प्रोफाइल सेव करें</button>
    </form>

    <div id="status"></div>
</div>

<script>
  // अजयकुमार भाई, आपका भेजा हुआ लिंक यहाँ लगा दिया है
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxI5yCC30OoW5b64E5Qlzc8OymOs122P0rFAP5nDPpFz-o5lLanshJtrWkpKAZmFKKI/exec';
  
  const form = document.getElementById('fullProfileForm');
  const status = document.getElementById('status');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', e => {
    e.preventDefault();
    btn.disabled = true;
    status.style.display = "block";
    status.style.background = "#e3f2fd";
    status.style.color = "#1565c0";
    status.innerHTML = "प्रतीक्षा करें... डेटा सुरक्षित सेव हो रहा है";

    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
          status.style.background = "#e8f5e9";
          status.style.color = "#2e7d32";
          status.innerHTML = "✅ बधाई हो अजयकुमार!<br>डेटा सफलतापूर्वक Google Sheet में सेव हो गया।";
          btn.disabled = false;
          form.reset(); 
      })
      .catch(error => {
          console.error('Error!', error.message);
          status.style.background = "#ffebee";
          status.style.color = "#c62828";
          status.innerHTML = "❌ Error! डेटा सेव नहीं हुआ। लिंक या इंटरनेट चेक करें।";
          btn.disabled = false;
      });
  });
</script>

</body>
       </html>
