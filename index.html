       <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>ohoh - Super App</title>
    <style>
        /* Force Hardware Acceleration for Smooth Video & Scroll */
        * {
            -webkit-perspective: 1000;
            backface-visibility: hidden;
            transform-style: preserve-3d;
        }

        body { 
            background-color: black; 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 10px; 
            text-align: center;
            overflow-x: hidden;
            touch-action: pan-y; /* Scroll speed fast karne ke liye */
        }
        
        /* ohoh Balanced Symmetry - Slim Style (Facebook Blue & Yellow) */
        .header-title { font-size: 32px; font-weight: 400; margin-bottom: 25px; letter-spacing: 2px; }
        .edge-blue { color: #1877F2; }  
        .middle-peela { color: #FBBC05; } 

        /* Optimized High-Speed Cards */
        .card { 
            background: white; 
            border-radius: 25px; 
            padding: 25px; 
            margin-bottom: 25px; 
            color: black; 
            border: 3px solid transparent; 
            min-height: 280px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(255,255,255,0.05);
        }
        
        .google-card { border-color: #4285F4; }
        .youtube-card { border-color: #FF0000; }
        .facebook-card { border-color: #1877F2; }
        .instagram-card { border-color: #E4405F; }

        .main-logo { width: 165px; height: 110px; object-fit: contain; margin: 15px 0; }

        /* AK-Special Fast Buttons */
        .btn { display: inline-block; padding: 15px 40px; border-radius: 35px; text-decoration: none; color: white; font-weight: bold; font-size: 16px; width: 85%; transition: 0.1s; }
        .btn-google { background-color: #4285F4; }
        .btn-youtube { background-color: #FF0000; }
        .btn-facebook { background-color: #1877F2; }
        .btn-instagram { background-color: #E4405F; }
    </style>
</head>
<body>

    <div class="header-title">
        <span class="edge-blue">o</span><span class="middle-peela">h</span><span class="middle-peela">o</span><span class="edge-blue">h</span>
    </div>

    <div class="card google-card">
        <div style="font-weight:600">Google Search</div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="main-logo">
        <a href="https://www.google.com" class="btn btn-google">Google Search</a>
    </div>

    <div class="card youtube-card">
        <div style="font-weight:600">YouTube Videos</div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="main-logo">
        <a href="https://m.youtube.com" class="btn btn-youtube">Watch Videos</a>
    </div>

    <div class="card facebook-card">
        <div style="font-weight:600">Facebook Social</div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" class="main-logo">
        <a href="https://m.facebook.com" class="btn btn-facebook">Open Facebook</a>
    </div>

    <div class="card instagram-card">
        <div style="font-weight:600">Instagram Explore</div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" class="main-logo">
        <a href="https://www.instagram.com/explore" class="btn btn-instagram">Open Instagram</a>
    </div>

    <p style="font-size: 14px; color: #888; margin-top: 40px; font-weight: bold;"> Ajay Kumar</p>

</body>
</html>
