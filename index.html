<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go on - Public Opinion Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .poll-container { background: white; max-width: 400px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0px 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        .option-btn { display: block; width: 100%; margin: 10px 0; padding: 12px; border: none; background: #007bff; color: white; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .option-btn:hover { background: #0056b3; }
        
        /* रिजल्ट स्टाइल */
        #results { display: none; text-align: left; margin-top: 20px; }
        .bar-container { background: #eee; border-radius: 5px; margin-bottom: 10px; overflow: hidden; }
        .bar { height: 25px; background: #28a745; text-align: right; padding-right: 10px; color: white; line-height: 25px; font-weight: bold; transition: width 1s ease-in-out; }
    </style>
</head>
<body>

    <div class="poll-container">
        <h2>Go on - पब्लिक ओपिनियन</h2>
        <p id="question">क्या भारत में पेट्रोल की कीमत कम होनी चाहिए?</p>

        <div id="vote-options">
            <button class="option-btn" onclick="submitVote('yes')">हाँ, बिल्कुल</button>
            <button class="option-btn" onclick="submitVote('no')">नहीं, ठीक है</button>
        </div>

        <div id="results">
            <h3>लाइव नतीजे:</h3>
            <p>हाँ: <span id="yes-percent">0%</span></p>
            <div class="bar-container">
                <div id="yes-bar" class="bar" style="width: 0%;"></div>
            </div>
            
            <p>नहीं: <span id="no-percent">0%</span></p>
            <div class="bar-container">
                <div id="no-bar" class="bar" style="width: 0%; background: #dc3545;"></div>
            </div>
            <p style="font-size: 12px; color: gray;">कुल वोट: <span id="total-votes">0</span></p>
        </div>
    </div>

    <script>
        // डमी डेटा (शुरुआत के लिए)
        let votes = { yes: 85, no: 15 };

        function submitVote(choice) {
            // वोट बढ़ाना
            votes[choice]++;
            let total = votes.yes + votes.no;

            // प्रतिशत निकालना
            let yesPercent = Math.round((votes.yes / total) * 100);
            let noPercent = Math.round((votes.no / total) * 100);

            // UI अपडेट करना
            document.getElementById('vote-options').style.display = 'none';
            document.getElementById('results').style.display = 'block';

            document.getElementById('yes-percent').innerText = yesPercent + '%';
            document.getElementById('yes-bar').style.width = yesPercent + '%';
            
            document.getElementById('no-percent').innerText = noPercent + '%';
            document.getElementById('no-bar').style.width = noPercent + '%';

            document.getElementById('total-votes').innerText = total;

            // अलर्ट देना
            alert("आपकी राय के लिए धन्यवाद अजयकुमार!");
        }
    </script>

</body>
</html>
