<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Ajay Kumar - Sage App</title>
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; }
        h1 { color: #00e5ff; text-shadow: 0 0 10px #00e5ff; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        .btn {
            width: 90%; max-width: 400px; padding: 15px; border-radius: 50px;
            font-size: 18px; font-weight: bold; text-decoration: none; color: white;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            border: 2px solid #00e5ff; box-shadow: 0 0 15px #00e5ff; transition: 0.3s;
        }

        /* बटन के रंग */
        .audio { background: #2ecc71; }
        .camera { background: #e74c3c; } 
        .whatsapp { background: #25d366; }
        .google { background: white; color: #4285F4; }
        .facebook { background: #1877f2; }
        .youtube { background: #ff0000; }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .upi { background: transparent; border: none; box-shadow: none; color: #f1c40f; text-decoration: underline; }
    
</head>
<body>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-6750713736202735" crossorigin="anonymous"></script>

        <a href="https://wa.me/" class="btn whatsapp">💬 WhatsApp</a>
        <a href="https://www.google.com" class="btn google">🌐 Google</a>
        <a href="https://www.facebook.com" class="btn facebook">📘 Facebook</a>
        <a href="https://www.youtube.com" class="btn youtube">▶️ YouTube</a>
