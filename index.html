<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Access - ajay kumar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .btn {
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            color: white;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .google { background-color: #4285F4; }
        .youtube { background-color: #FF0000; }
        .facebook { background-color: #1877F2; }
        .instagram { background-color: #E4405F; }
    </style>
</head>
<body>

    <div class="container">
        <a href="https://www.google.com" class="btn google">Google</a>
        <a href="https://www.youtube.com" class="btn youtube">YouTube</a>
        <a href="https://www.facebook.com" class="btn facebook">Facebook</a>
        <a href="https://www.instagram.com" class="btn instagram">Instagram</a>
    </div>

</body>
    </html>
