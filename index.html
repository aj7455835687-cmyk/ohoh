<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Apps Dashboard</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            background-color: #f0f2f5; 
            font-family: sans-serif;
        }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            width: 100%; 
            max-width: 400px; 
        }
        .app-card { 
            background-color: white; 
            border-radius: 20px; 
            height: 110px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-decoration: none; 
            border: 1px solid #eee; 
            transition: transform 0.2s;
        }
        .app-card:active { transform: scale(0.95); }
        .app-logo { width: 70px; height: 70px; object-fit: contain; }
    </style>
</head>
<body>

    <div class="grid-container">
        <a href="https://www.google.com" class="app-card">
            <img src="https://www.gstatic.com/images/branding/product/2x/googleg_96dp.png" class="app-logo">
        </a>
