<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohoh - The Universe Ajay Kumar</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        h1 { color: #00e5ff; text-shadow: 0 0 10px #00e5ff; font-size: 2.5rem; }
        .super-box { background: #fff; padding: 10px; border-radius: 20px; margin: 20px auto; max-width: 600px; color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header-text { font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; display: block; }
        iframe { width: 100%; height: 500px; border: none; border-radius: 15px; }
        
        /* अलग-अलग रंगों के बॉर्डर */
        .google-border { border: 4px solid #4285F4; }
        .youtube-border { border: 4px solid #FF0000; }
        .fb-border { border: 4px solid #1877F2; }
        .insta-border { border: 4px solid #E1306C; }
    </style>
</head>
<body>

    <h1>ohoh</h1>

    <div class="super-box google-border">
        <span class="header-text" style="color: #4285F4;">🌐 Google Search</span>
        <iframe src="https://www.google.com/search?igu=1"></iframe>
    </div>

    <div class="super-box youtube-border">
        <span class="header-text" style="color: #FF0000;">▶️ YouTube Video Player</span>
        <iframe src="https://m.youtube.com"></iframe>
    </div>

    <div class="super-box fb-border">
        <span class="header-text" style="color: #1877F2;">📘 Facebook Social</span>
        <iframe src="https://m.facebook.com"></iframe>
    </div>

    <div class="super-box insta-border">
        <span class="header-text" style="color: #E1306C;">📸 Instagram Explore</span>
        <iframe src="https://www.instagram.com"></iframe>
    </div>

    <p style="color: #666; font-size: 12px; margin-top: 30px;">Created by Ajay Kumar</p>

</body>
</html>
