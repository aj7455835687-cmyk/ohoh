<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Apps Dashboard</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            background-color: #f0f2f5; 
            font-family: sans-serif;
        }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            width: 100%; 
            max-width: 400px; 
        }
        .app-card { 
            background-color: white; 
            border-radius: 20px; 
            height: 110px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-decoration: none; 
            border: 1px solid #eee; 
            transition: transform 0.2s;
        }
        .app-card:active { transform: scale(0.95); }
        .app-logo { width: 70px; height: 70px; object-fit: contain; }
    </style>
</head>
<body>

    <div class="grid-container">
        <a href="https://www.google.com" class="app-card">
            <img src="https://www.gstatic.com/images/branding/product/2x/googleg_96dp.png" class="app-logo">
        </a>

        <a href="https://www.youtube.com" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" class="app-logo">
        </a>

        <a href="https://wa.me/?text=Hi" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="app-logo">
        </a>

        <a href="https://www.instagram.com" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/2048px-Instagram_logo_2016.svg.png" class="app-logo">
        </a>

        <a href="https://www.facebook.com/n/?feed" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_(2019).png" class="app-logo">
        </a>

        <a href="phonepe://" class="app-card">
            <img src="https://download.logo.wine/logo/PhonePe/PhonePe-Logo.wine.png" class="app-logo">
        </a>

        <a href="https://www.amazon.in" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" class="app-logo">
        </a>

        <a href="https://mail.google.com" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" class="app-logo">
        </a>

        <a href="https://chat.openai.com" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" class="app-logo">
        </a>

        <a href="https://play.google.com" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Google_Play_Arrow_logo.svg" class="app-logo">
        </a>

        <a href="https://maps.google.com" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/aa/Google_Maps_icon_%282020%29.svg" class="app-logo">
        </a>

        <a href="https://www.netflix.com" class="app-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="app-logo">
        </a>
    </div>

</body>
                </html>
