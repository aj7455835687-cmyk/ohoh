<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ohoh Super App</title>
    <style>
        body {
            background-color: #000; /* काला बैकग्राउंड जैसा स्क्रीनशॉट में है */
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }
        /* ohoh का रंग फेसबुक जैसा नीला और ग्लो खत्म */
        .logo-text {
            color: #1877F2; 
            font-size: 50px;
            font-weight: bold;
            margin: 0;
            text-shadow: none; 
        }
        .card {
            background-color: white;
            border-radius: 20px;
            margin-bottom: 20px;
            padding: 10px;
            overflow: hidden;
        }
        .card h3 {
            margin-top: 0;
            text-align: center;
            font-size: 18px;
        }
        /* अलग-अलग बॉर्डर कलर्स */
        .google-card { border: 4px solid #4285F4; }
        .youtube-card { border: 4px solid #FF0000; }
        .facebook-card { border: 4px solid #1877F2; }
        .instagram-card { border: 4px solid #E1306C; }

        iframe {
            width: 100%;
            height: 500px; /* गूगल की तरह बड़ा आकार */
            border: none;
            border-radius: 10px;
        }
        footer {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1 class="logo-text">ohoh</h1>
        </div>

    <div class="card google-card">
        <h3 style="color: #4285F4;">🌐 Google Search</h3>
        <iframe src="https://www.google.com/search?igu=1"></iframe>
    </div>

    <div class="card youtube-card">
        <h3 style="color: #FF0000;">▶️ YouTube Videos</h3>
        <iframe src="https://m.youtube.com"></iframe>
    </div>

    <div class="card facebook-card">
        <h3 style="color: #1877F2;">📘 Facebook Social</h3>
        <iframe src="https://m.facebook.com"></iframe>
    </div>

    <div class="card instagram-card">
        <h3 style="color: #E1306C;">📸 Instagram Explore</h3>
        <iframe src="https://www.instagram.com"></iframe>
    </div>

    <footer>
        Developed by Ajay Kumar
    </footer>
</div>

</body>
    </html>
